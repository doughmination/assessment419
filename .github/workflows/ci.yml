name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: npm i

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install lint & format tools (global)
        run: npm i -g eslint prettier prettier-plugin-ejs

      - name: Resolve global node_modules path
        id: globals
        run: echo "path=$(npm root -g)" >> "$GITHUB_OUTPUT"

      - name: Lint
        run: eslint "**/*.{js,mjs,cjs}" --ignore-pattern "node_modules/**"

      - name: Format check
        run: prettier --check "**/*.{js,mjs,cjs,json,md,css,html,ejs}" --ignore-path .gitignore --plugin=${{ steps.globals.outputs.path }}/prettier-plugin-ejs

      - name: Test
        run: npm run test